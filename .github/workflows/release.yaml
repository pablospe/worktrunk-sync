name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --release

      - name: Publish to crates.io (trusted publishing)
        run: |
          # 1. Get OIDC token from GitHub Actions
          oidc_response=$(curl -sS -X POST \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://crates.io" \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            -H "Accept: application/json")
          oidc_token=$(echo "$oidc_response" | jq -r '.value')

          # 2. Exchange OIDC token for a crates.io publish token
          exchange_response=$(curl -sS -X POST \
            "https://crates.io/api/v1/trusted_publishing/tokens" \
            -H "Content-Type: application/json" \
            -d "{\"jwt\": \"${oidc_token}\"}")
          publish_token=$(echo "$exchange_response" | jq -r '.token')

          if [ "$publish_token" = "null" ] || [ -z "$publish_token" ]; then
            echo "::error::Failed to exchange OIDC token: $exchange_response"
            exit 1
          fi

          echo "::add-mask::${publish_token}"
          export CARGO_REGISTRY_TOKEN="${publish_token}"

          # 3. Publish
          cargo publish

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} --generate-notes
